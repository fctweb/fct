<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no">
<title>验证</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }
  #captcha{
    width:320px;
    height:90px;
    background-image: url('https://www.inmotionhosting.com/support/wp-content/uploads/2022/10/check-box-v2.jpg');
    background-size:cover;
    background-position:center;
    cursor:pointer;
  }
  video{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    object-fit:cover;
    display:none;
  }
</style>
</head>
<body>

<div id="captcha"></div>
<video id="v" loop playsinline></video>

<script>
const v = document.getElementById('v');
v.src = "https://fctweb.github.io/fct/dontclick/videoplayback.mp4";
const captcha = document.getElementById("captcha");

function goFull() {
  try {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } catch(e){}
}

// 点击触发
captcha.onclick = () => {
  captcha.style.display = "none";
  v.style.display = "block";
  v.play();
  goFull();
};

// 🔥 毫秒级强制拉回全屏
setInterval(() => {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    goFull();
  }
}, 0);

// 监听退出，立刻重进
document.addEventListener("fullscreenchange", function(){
  if(!document.fullscreenElement) goFull();
});
document.addEventListener("webkitfullscreenchange", function(){
  if(!document.webkitFullscreenElement) goFull();
});
</script>
</body>
</html>
