<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>圖書館進館統計</title>
  <style>
    :root {
      --bg1: #edf4ff;
      --bg2: #f8fbff;
      --card: rgba(255, 255, 255, 0.88);
      --text: #1e293b;
      --muted: #64748b;
      --primary2: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f97316;
      --shadow: 0 22px 60px rgba(37, 99, 235, 0.18);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.16), transparent 32%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .network-status {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(12px);
      font-weight: 900;
      color: #334155;
      user-select: none;
    }

    .network-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #94a3b8;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.16);
    }

    .network-status.good .network-dot {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.16);
    }

    .network-status.slow .network-dot {
      background: var(--warning);
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.16);
    }

    .network-status.bad .network-dot {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.16);
    }

    .app {
      width: min(1160px, 100%);
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .header {
      padding: 32px 34px 18px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.1);
      color: var(--primary2);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 62px);
      letter-spacing: 2px;
      line-height: 1.08;
    }

    .subtitle {
      margin: 14px 0 0;
      font-size: clamp(16px, 2vw, 22px);
      color: var(--muted);
    }

    .main {
      padding: 20px 34px 38px;
    }

    .grade-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: stretch;
    }

    .grade-group {
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 14px 38px rgba(15, 23, 42, 0.08);
    }

    .group-title {
      margin: 0 0 16px;
      text-align: center;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 900;
      letter-spacing: 4px;
      color: #0f172a;
    }

    .button-column {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .grade-btn {
      border: none;
      min-height: 135px;
      border-radius: 26px;
      color: white;
      cursor: pointer;
      font-size: clamp(36px, 5vw, 58px);
      font-weight: 900;
      letter-spacing: 5px;
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
      position: relative;
      overflow: hidden;
    }

    .grade-btn:hover {
      transform: translateY(-4px);
      filter: brightness(1.05);
    }

    .grade-btn:active {
      transform: scale(0.97);
    }

    .grade-btn:disabled {
      cursor: not-allowed;
      opacity: 0.72;
      transform: none !important;
      filter: grayscale(0.25) brightness(0.9);
    }

    .grade-btn.disabled {
      filter: grayscale(0.35) brightness(0.85);
    }

    .junior .grade-btn:nth-child(1) {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 0 16px 34px rgba(37, 99, 235, 0.26);
    }

    .junior .grade-btn:nth-child(2) {
      background: linear-gradient(135deg, #0891b2, #0e7490);
      box-shadow: 0 16px 34px rgba(8, 145, 178, 0.25);
    }

    .junior .grade-btn:nth-child(3) {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      box-shadow: 0 16px 34px rgba(124, 58, 237, 0.25);
    }

    .senior .grade-btn:nth-child(1) {
      background: linear-gradient(135deg, #f97316, #ea580c);
      box-shadow: 0 16px 34px rgba(249, 115, 22, 0.25);
    }

    .senior .grade-btn:nth-child(2) {
      background: linear-gradient(135deg, #16a34a, #15803d);
      box-shadow: 0 16px 34px rgba(22, 163, 74, 0.25);
    }

    .senior .grade-btn:nth-child(3) {
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      box-shadow: 0 16px 34px rgba(220, 38, 38, 0.25);
    }

    .footer {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 15px;
      flex-wrap: wrap;
    }

    .footer-text {
      font-weight: 700;
    }

    .queue-status {
      display: none;
    }

    .fullscreen-btn {
      border: none;
      border-radius: 18px;
      padding: 14px 22px;
      cursor: pointer;
      background: linear-gradient(135deg, #0f172a, #334155);
      color: white;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 1px;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.22);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .fullscreen-btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .fullscreen-btn:active {
      transform: scale(0.97);
    }

    .toast-layer {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.32);
      backdrop-filter: blur(6px);
      z-index: 20;
      padding: 20px;
      pointer-events: auto;
    }

    .toast-layer.show {
      display: flex;
    }

    .toast {
      width: min(520px, 100%);
      background: white;
      border-radius: 30px;
      padding: 42px 30px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.28);
      animation: pop 0.18s ease-out;
    }

    @keyframes pop {
      from { transform: scale(0.92); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .toast-icon {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      margin: 0 auto 18px;
      color: white;
      display: grid;
      place-items: center;
      font-size: 54px;
      font-weight: 900;
    }

    .toast-icon.success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow: 0 14px 32px rgba(22, 163, 74, 0.28);
      animation: successPop 0.24s ease-out;
    }

    .toast-icon.error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 14px 32px rgba(220, 38, 38, 0.26);
      animation: successPop 0.24s ease-out;
    }

    .toast-icon.loading {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 14px 32px rgba(37, 99, 235, 0.24);
      font-size: 42px;
    }

    @keyframes successPop {
      0% { transform: scale(0.72); opacity: 0; }
      70% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .check-svg {
      width: 58px;
      height: 58px;
      display: block;
    }

    .check-svg path {
      fill: none;
      stroke: white;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 0.28s ease-out 0.12s forwards;
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    .toast h2 {
      margin: 0;
      font-size: 42px;
    }

    .toast p {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 20px;
    }

    .hidden-submit-frame {
      display: none;
    }

    @media (max-width: 760px) {
      body { padding: 12px; }
      .network-status {
        top: 10px;
        right: 10px;
        font-size: 13px;
        padding: 8px 10px;
      }
      .header { padding: 48px 18px 14px; }
      .main { padding: 16px 18px 26px; }
      .grade-layout { gap: 14px; }
      .grade-group { padding: 14px; border-radius: 22px; }
      .button-column { gap: 12px; }
      .grade-btn {
        min-height: 112px;
        border-radius: 20px;
        letter-spacing: 3px;
      }
      .footer {
        justify-content: center;
        text-align: center;
      }
      .fullscreen-btn {
        width: 100%;
        max-width: 320px;
      }
    }

    @media (max-width: 480px) {
      .grade-layout {
        grid-template-columns: 1fr;
      }
      .grade-btn {
        min-height: 96px;
      }
    }
  </style>
</head>
<body>
  <div class="network-status" id="networkStatus">
    <span class="network-dot"></span>
    <span id="networkText">檢測網絡中...</span>
  </div>

  <main class="app">
    <section class="header">
      <div class="badge">📚 圖書館入館記錄</div>
      <h1>圖書館進館統計</h1>
      <p class="subtitle">左邊初中，右邊高中；點一下即自動提交</p>
    </section>

    <section class="main">
      <div class="grade-layout">
        <div class="grade-group junior">
          <h2 class="group-title">初中</h2>
          <div class="button-column">
            <button class="grade-btn" type="button" onclick="submitGrade('初一')">初一</button>
            <button class="grade-btn" type="button" onclick="submitGrade('初二')">初二</button>
            <button class="grade-btn" type="button" onclick="submitGrade('初三')">初三</button>
          </div>
        </div>

        <div class="grade-group senior">
          <h2 class="group-title">高中</h2>
          <div class="button-column">
            <button class="grade-btn" type="button" onclick="submitGrade('高一')">高一</button>
            <button class="grade-btn" type="button" onclick="submitGrade('高二')">高二</button>
            <button class="grade-btn" type="button" onclick="submitGrade('高三')">高三</button>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="footer-text">點選年級後會自動提交，成功提示顯示 0.5 秒後返回主畫面。</div>
        <button class="fullscreen-btn" id="fullscreenBtn" type="button" onclick="toggleFullscreen()">點我全屏</button>
      </div>
    </section>
  </main>

  <div class="toast-layer" id="toastLayer">
    <div class="toast">
      <div class="toast-icon success" id="toastIcon"></div>
      <h2 id="toastTitle">提交成功</h2>
      <p id="toastMessage"><span id="submittedGrade">年級</span> 已記錄，正在返回主頁面...</p>
    </div>
  </div>

  <script>
    const FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLScPUl_1_o3XPVEPljqI9fhOFXknc3nK9puWNWGzosvfVPs84g/formResponse";
    const ENTRY_NAME = "entry.842011085";

    // 每隔 2 秒測一次；超過 3 秒就當作超時
    const PING_INTERVAL = 2000;
    const PING_TIMEOUT = 3000;

    // 勾勾顯示 0.5 秒；這 0.5 秒內不能按任何年級
    const SUCCESS_SHOW_TIME = 500;

    // 後台提交超過 8 秒未返回，就重試
    const SUBMIT_TIMEOUT = 8000;
    const MAX_RETRY = 3;

    const toastLayer = document.getElementById("toastLayer");
    const toastIcon = document.getElementById("toastIcon");
    const toastTitle = document.getElementById("toastTitle");
    const toastMessage = document.getElementById("toastMessage");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const networkStatus = document.getElementById("networkStatus");
    const networkText = document.getElementById("networkText");

    let busy = false;
    let networkOK = false;
    let toastTimer = null;

    // 提交隊列：用來避免短時間多次點擊時漏記。
    let submitQueue = [];
    let isProcessingQueue = false;
    let sentCount = 0;
    let failedCount = 0;

    function setAllGradeButtonsDisabled(disabled) {
      document.querySelectorAll(".grade-btn").forEach((btn) => {
        btn.disabled = disabled;
      });
    }

    function setBusy(value) {
      busy = value;
      setAllGradeButtonsDisabled(value);
    }

    function showToast(type, title, message, ms = 500, afterHide = null) {
      clearTimeout(toastTimer);

      toastIcon.className = "toast-icon " + type;

      if (type === "success") {
        toastIcon.innerHTML = `
          <svg class="check-svg" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M18 33.5 L27.5 43 L47 21"></path>
          </svg>
        `;
      } else if (type === "error") {
        toastIcon.textContent = "!";
      } else {
        toastIcon.textContent = "…";
      }

      toastTitle.textContent = title;
      toastMessage.innerHTML = message;
      toastLayer.classList.add("show");

      if (ms > 0) {
        toastTimer = setTimeout(() => {
          toastLayer.classList.remove("show");
          if (typeof afterHide === "function") afterHide();
        }, ms);
      }
    }

    function updateQueueStatus() {
      // 不在前台顯示隊列文字，避免老師或使用者看到技術提示。
    }

    function setNetworkStatus(status, text) {
      networkStatus.className = "network-status " + status;
      networkText.textContent = text;

      document.querySelectorAll(".grade-btn").forEach((btn) => {
        if (status === "bad") {
          btn.classList.add("disabled");
        } else {
          btn.classList.remove("disabled");
        }
      });
    }

    function getPingUrl() {
      if (location.protocol === "http:" || location.protocol === "https:") {
        const base = location.origin + location.pathname;
        return base + "?ping=" + Date.now();
      }

      return "https://github.githubassets.com/favicons/favicon.png?ping=" + Date.now();
    }

    function checkNetwork() {
      const start = performance.now();
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), PING_TIMEOUT);

      fetch(getPingUrl(), {
        method: "GET",
        cache: "no-store",
        mode: location.protocol === "file:" ? "no-cors" : "same-origin",
        signal: controller.signal
      })
      .then(() => {
        clearTimeout(timer);
        const pingMs = Math.round(performance.now() - start);
        networkOK = true;

        if (pingMs <= 800) {
          setNetworkStatus("good", "網絡良好 " + pingMs + "ms");
        } else {
          setNetworkStatus("slow", "網絡較慢 " + pingMs + "ms");
        }
      })
      .catch(() => {
        clearTimeout(timer);
        networkOK = false;
        setNetworkStatus("bad", "連接失敗 / 超時");
      });
    }

    function submitGrade(grade) {
      // 勾勾顯示的 0.5 秒內不能再點
      if (busy) return;

      if (!networkOK) {
        showToast("error", "提交失敗", "網絡錯誤，請檢查連接後再試。", 1200);
        return;
      }

      // 立即顯示成功，0.5 秒內鎖住按鈕。
      setBusy(true);
      showToast("success", "提交成功", "<span>" + grade + "</span> 已成功記錄。", SUCCESS_SHOW_TIME, () => {
        setBusy(false);
      });

      // 加入提交隊列，一條一條送到 Google 表單。
      submitQueue.push({
        grade: grade,
        attempts: 0,
        id: Date.now() + "_" + Math.random().toString(16).slice(2)
      });

      updateQueueStatus();
      processQueue();
    }

    function processQueue() {
      if (isProcessingQueue) return;
      if (submitQueue.length === 0) {
        updateQueueStatus();
        return;
      }

      isProcessingQueue = true;
      updateQueueStatus();

      const item = submitQueue.shift();
      sendOneQueuedItem(item)
        .then(() => {
          sentCount++;
          isProcessingQueue = false;
          updateQueueStatus();
          processQueue();
        })
        .catch(() => {
          item.attempts++;

          if (item.attempts < MAX_RETRY) {
            // 失敗就放回隊列前面重試，避免漏記
            submitQueue.unshift(item);
          } else {
            failedCount++;
            showToast("error", "提交異常", "網絡不穩定，請稍後再試或檢查 Google 表單。", 1800);
          }

          isProcessingQueue = false;
          updateQueueStatus();

          // 稍微等一下再繼續，避免網絡壞時瘋狂重試
          setTimeout(processQueue, 1000);
        });
    }

    function sendOneQueuedItem(item) {
      return new Promise((resolve, reject) => {
        const submitId = "submitFrame_" + item.id + "_" + item.attempts;

        const iframe = document.createElement("iframe");
        iframe.name = submitId;
        iframe.className = "hidden-submit-frame";
        iframe.title = "hidden submit frame";

        let hasSubmitted = false;
        let finished = false;

        function cleanup() {
          setTimeout(() => iframe.remove(), 3000);
        }

        const timeout = setTimeout(() => {
          if (finished) return;
          finished = true;
          cleanup();
          reject(new Error("timeout"));
        }, SUBMIT_TIMEOUT);

        iframe.onload = () => {
          if (!hasSubmitted || finished) return;

          finished = true;
          clearTimeout(timeout);
          cleanup();
          resolve();
        };

        document.body.appendChild(iframe);

        const form = document.createElement("form");
        form.action = FORM_ACTION;
        form.method = "POST";
        form.target = submitId;
        form.style.display = "none";

        const input = document.createElement("input");
        input.name = ENTRY_NAME;
        input.value = item.grade;
        form.appendChild(input);

        document.body.appendChild(form);

        hasSubmitted = true;
        form.submit();

        // 不要立刻刪除 form，避免瀏覽器還沒送完
        setTimeout(() => form.remove(), 3000);
      });
    }

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
    }

    function toggleFullscreen() {
      if (!getFullscreenElement()) {
        const page = document.documentElement;

        if (page.requestFullscreen) {
          page.requestFullscreen();
        } else if (page.webkitRequestFullscreen) {
          page.webkitRequestFullscreen();
        } else if (page.msRequestFullscreen) {
          page.msRequestFullscreen();
        }

        fullscreenBtn.textContent = "退出全屏";
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }

        fullscreenBtn.textContent = "點我全屏";
      }
    }

    document.addEventListener("fullscreenchange", () => {
      fullscreenBtn.textContent = getFullscreenElement() ? "退出全屏" : "點我全屏";
    });

    document.addEventListener("webkitfullscreenchange", () => {
      fullscreenBtn.textContent = getFullscreenElement() ? "退出全屏" : "點我全屏";
    });

    window.addEventListener("online", checkNetwork);
    window.addEventListener("offline", () => {
      networkOK = false;
      setNetworkStatus("bad", "連接失敗 / 超時");
    });

    checkNetwork();
    setInterval(checkNetwork, PING_INTERVAL);
  </script>
</body>
</html>
